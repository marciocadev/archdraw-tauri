name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag da release (ex: v0.1.0)'
        required: true
        default: 'v0.1.0'
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-24.04
            args: '--bundles deb,rpm,appimage'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: 'true'
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          releaseName: ArchDraw ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          releaseBody: |
            Instaladores do ArchDraw para Windows, macOS e Linux.

            - **Windows**: `.msi` (recomendado) ou `.exe`
            - **macOS**: `.dmg` (universal — Apple Silicon + Intel)
            - **Linux**: `.deb` (Debian/Ubuntu), `.rpm` (Fedora/RHEL), `.AppImage` (portátil)
          releaseDraft: false
          prerelease: false
          uploadWorkflowArtifacts: true
          args: ${{ matrix.args }}

      - name: Resumo do build
        run: |
          echo "Release: ${{ steps.tauri.outputs.releaseHtmlUrl }}"
          echo "Artefatos: ${{ steps.tauri.outputs.artifactPaths }}"
