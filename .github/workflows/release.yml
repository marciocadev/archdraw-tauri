name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag da release. Deixe vazio para usar a tag git v* mais recente.'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          INPUT="${{ inputs.version }}"
          if [ -n "$INPUT" ]; then
            case "$INPUT" in
              v*) TAG="$INPUT" ;;
              *) TAG="v${INPUT}" ;;
            esac
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            echo "Nenhuma tag git v* encontrada. Crie e envie uma tag antes de executar o workflow."
            exit 1
          fi

          echo "tag=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Release tag
        run: echo "Using tag ${{ steps.resolve.outputs.tag }}"

  build:
    needs: resolve-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-24.04
            args: '--bundles deb,rpm,appimage'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: 'true'
        with:
          tagName: ${{ needs.resolve-version.outputs.tag }}
          releaseName: ArchDraw ${{ needs.resolve-version.outputs.tag }}
          releaseBody: |
            Instaladores do ArchDraw para Windows, macOS e Linux.

            - **Windows**: `.msi` (recomendado) ou `.exe`
            - **macOS**: `.dmg` (universal — Apple Silicon + Intel)
            - **Linux**: `.deb` (Debian/Ubuntu), `.rpm` (Fedora/RHEL), `.AppImage` (portátil)
          releaseDraft: false
          prerelease: false
          uploadWorkflowArtifacts: true
          args: ${{ matrix.args }}

      - name: Resumo do build
        run: |
          echo "Release: ${{ steps.tauri.outputs.releaseHtmlUrl }}"
          echo "Artefatos: ${{ steps.tauri.outputs.artifactPaths }}"
